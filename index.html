<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Vulcan Ox Logistics | VOX</title>

<style>

body{    
color:#e6e6e6;
font-family:Arial, Helvetica, sans-serif;
margin:0;
height:100vh;
text-align:center;
}   

.container {
max-width: 1200px;
padding: 60px;
}


h1 {
    font-size:120px;
    letter-spacing:6px;
    margin-bottom:10px;

    background: linear-gradient(
        180deg,
        #f5f5f5 0%,
        #d6d6d6 20%,
        #ffb347 40%,
        #ff7a00 60%,
        #c93c00 80%,
        #4a1a00 100%
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 8px rgba(255,120,0,0.6),
        0 0 20px rgba(255,80,0,0.6),
        0 0 40px rgba(255,0,0,0.4);
}

.slogan{
font-size:32px;
color:#ff6a00;
margin-bottom:40px;
}

.buttons a{
display:inline-block;
margin:12px;
padding:16px 36px;

background:linear-gradient(
180deg,
rgba(40,40,40,0.95),
rgba(15,15,15,0.95)
);

border:2px solid rgba(255,120,0,0.7);
color:#ff8c1a;
font-weight:bold;
letter-spacing:1px;
text-decoration:none;
border-radius:8px;
box-shadow:
0 4px 15px rgba(0,0,0,0.8),
0 0 8px rgba(255,120,0,0.5) inset;
transition:0.3s;
}

.buttons a:hover{
color:white;
border-color:#ff6a00;
box-shadow:
0 0 12px #ff6a00,
0 0 25px #ff3c00,
0 0 40px rgba(255,60,0,0.7);
transform:translateY(-3px) scale(1.05);
}

.buttons{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
}    

.button{
color:#ffb347;
font-weight:bold;
letter-spacing:1px;
padding:14px 28px;
background:rgba(15,15,15,0.9);
border:1px solid rgba(255,120,0,0.35);
border-radius:6px;
box-shadow:
inset 0 2px 4px rgba(255,140,0,0.35),
inset 0 -4px 8px rgba(0,0,0,0.8),
0 8px 20px rgba(0,0,0,0.9);
transition:all 0.25s ease;
}

.button:hover{
color:#fff;
box-shadow:
inset 0 2px 8px rgba(255,160,0,0.6),
0 0 15px rgba(255,120,0,0.7),
0 10px 25px rgba(0,0,0,0.9);
transform:translateY(-2px);
}    

.road-button{
position:absolute;
padding:14px 32px;
/* TEXT */
color:#ffcc66;
text-shadow:
0 0 10px rgba(255,140,0,1),
0 0 20px rgba(255,80,0,0.9);
/* POZADÍ (kámen) */
background:rgba(25,25,25,0.85);
border-radius:4px;
border:1px solid rgba(255,120,0,0.4);
/* EFEKT */
box-shadow:
0 6px 20px rgba(0,0,0,0.9),
inset 0 0 12px rgba(255,80,0,0.35),
0 0 10px rgba(255,120,0,0.4),
0 8px 25px rgba(255,80,0,0.25);    
/* LEHKÉ ODDĚLENÍ OD SILNICE */
backdrop-filter:blur(2px);
/* PERSPEKTIVA */
transform:translateX(-50%) perspective(600px) rotateX(8deg);
transition:0.3s;
animation:lavaGlow 2.5s infinite alternate;    
}

@keyframes lavaGlow{
0%{
filter:brightness(0.95);
}
100%{
filter:brightness(1.15);
}
}
    
.road-button:hover{
color:#fff;
border-color:#ff6600;
box-shadow:
0 0 12px #ff6600,
0 0 30px rgba(255,80,0,0.6);
transform:translateX(-50%) perspective(600px) rotateX(8deg) scale(1.05);
}   

.discord{
bottom:120px;
left:50%;
}

.vstupte{
bottom:200px;
left:50%;
}
    
.join{
bottom:280px;
left:50%;
}    
    
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("ib7.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

z-index:-1;
}
.sparks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
overflow:hidden;
}

.sparks span{
position:absolute;
bottom:-10px;
width:var(--size);
height:var(--size);
animation:
sparkRise var(--duration) linear infinite,
sparkFlicker 0.8s infinite alternate;
filter: blur(0.5px);    
background:radial-gradient(circle,
#ffcc66 0%,
#ff6a00 40%,
rgba(255,80,0,0.2) 70%,
transparent 100%
);
border-radius:50%;
box-shadow:
0 0 6px rgba(255,120,0,0.8),
0 0 12px rgba(255,80,0,0.4);
opacity:0.8;
}

@keyframes sparkRise{
0%{
transform:translateY(0) translateX(0) scale(1);
opacity:1;
}
30%{
transform:translateY(-30vh) translateX(calc(var(--drift) * 0.5));
opacity:0.9;
}
70%{
transform:translateY(-70vh) translateX(var(--drift));
opacity:0.6;
}
100%{
transform:translateY(-110vh) translateX(calc(var(--drift) * -0.3)) scale(0.4);
opacity:0;
}

}

@keyframes sparkFlicker{
0%{ opacity:0.6; filter:brightness(0.8); }
100%{ opacity:1; filter:brightness(1.4); }
}    

@keyframes lavaFlash{
0%{ filter:brightness(1); }
50%{ filter:brightness(1.35); }
100%{ filter:brightness(1); }
}

.lava-flash{
animation: lavaFlash 0.6s ease-out;
}
.flash-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background: radial-gradient(circle at 50% 65%,
rgba(255,120,0,0.35) 0%,
rgba(255,60,0,0.15) 40%,
rgba(0,0,0,0) 70%);

pointer-events:none;
opacity:0;
z-index:2;
transition:opacity 0.2s ease;
}

.flash-overlay.active{
opacity:1;
}
.smoke{
position:fixed;
left:0;
bottom:0;

width:100%;
height:60%;

background: radial-gradient(
ellipse at 50% 75%,
rgba(120,120,120,0.35) 0%,
rgba(80,80,80,0.25) 30%,
rgba(40,40,40,0.15) 55%,
rgba(0,0,0,0) 80%
);

pointer-events:none;
z-index:1;

animation: smokeMove 20s ease-in-out infinite;
}

@keyframes smokeMove{

0%{
transform:translateX(-3%);
}

50%{
transform:translateX(3%);
}

100%{
transform:translateX(-3%);
}

}    
</style>
</head>

<body>

<div class="sparks"></div>
<div class="flash-overlay"></div>
<div class="smoke"></div>    
<div class="container">

<a class="road-button discord" href="https://discord.gg/EPJTvBu6">Discord</a>

<a class="road-button vstupte" href="home.html">Vstupte</a>

<a class="road-button join" href="https://hub.truckyapp.com/applications/questionnaire" target="_blank">
Přidej se k VOX
</a>

</div>
<script>
const sparks = document.querySelector(".sparks");

for(let i=0;i<35;i++){
let spark = document.createElement("span");
spark.style.left = Math.random()*100 + "vw";
spark.style.animationDelay = Math.random()*5 + "s";
spark.style.bottom = Math.random()*40 + "vh";    
spark.style.setProperty("--size", (Math.random()*4+2) + "px");    
spark.style.setProperty("--duration", (3 + Math.random()*5) + "s");
spark.style.setProperty("--drift", (Math.random()*80 - 40) + "px");
spark.style.opacity = 0.4 + Math.random()*0.6;
spark.style.opacity = Math.random();    
sparks.appendChild(spark);
}
const flash = document.querySelector(".flash-overlay");

function lavaCrack(){

flash.classList.add("active");

setTimeout(()=>{
flash.classList.remove("active");
},140);

}

setInterval(()=>{
if(Math.random() < 0.18){
lavaCrack();
}
},4000);
    
</script>
</body>
</html>
