<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Vulcan Ox Logistics | VOX</title>

<style>

body{    
background-image: url("background9.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;

color:#e6e6e6;
font-family:Arial, Helvetica, sans-serif;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.container {
    max-width: 1200px;
    padding: 60px;
    transform: translateY(-320px);
}


h1 {
    font-size:120px;
    letter-spacing:6px;
    margin-bottom:10px;

    background: linear-gradient(
        180deg,
        #f5f5f5 0%,
        #d6d6d6 20%,
        #ffb347 40%,
        #ff7a00 60%,
        #c93c00 80%,
        #4a1a00 100%
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 8px rgba(255,120,0,0.6),
        0 0 20px rgba(255,80,0,0.6),
        0 0 40px rgba(255,0,0,0.4);
}

.slogan{
font-size:32px;
color:#ff6a00;
margin-bottom:40px;
}

.buttons a{
display:inline-block;
margin:10px;
padding:12px 24px;
border:1px solid #ff6a00;
color:#ff6a00;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.buttons a:hover{
background:#ff6a00;
color:black;

box-shadow:
0 0 10px #ff6a00,
0 0 25px #ff3c00,
0 0 40px #ff0000;

transform: scale(1.05);
}
@keyframes lavaPulse{
0%{
filter:brightness(0.5);
}
50%{
filter:brightness(2);
}
100%{
filter:brightness(0.5);
}


body{
animation: lavaPulse 4s infinite ease-in-out;
}
</style>
</head>

<body>

<div class="container">

<h1>VULCAN OX LOGISTICS</h1>

<div class="slogan">
Klid v pohybu
</div>

<div class="buttons">

<a href="https://discord.gg/EPJTvBu6">Discord</a>

<a href="#">Kick Stream</a>

<a href="#">Přidej se k VOX</a>

</div>

</div>

</body>
</html>
