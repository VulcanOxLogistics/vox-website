<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>Vulcan Ox Logistics</title>

<style>

body{

margin:0;
font-family:Arial, sans-serif;
color:white;

background-image:url("homeback1.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

/* horní lišta */

.navbar{
position:fixed;
top:0;
left:0;

width:100%;
height:70px;

background:linear-gradient(#111,#0b0b0b);
border-bottom:2px solid #ff6600;
box-shadow:0 0 20px rgba(255,100,0,0.4);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 40px;
box-sizing:border-box;
}

.logo{
font-size:22px;
color:#ff6600;
font-weight:bold;
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
}

.menu a:hover{
color:#ff6600;
text-shadow:0 0 10px #ff6600;
}

/* obsah */

.content{
margin-top:120px;
text-align:center;
}

/* pravý panel */
.vox-menu {
position: fixed;

right: 70px;

top: 200px;

width:200px;

display:flex;

flex-direction:column;

align-items:center;

gap:25px;
}

.vox-button{

width:140px;

background: linear-gradient(180deg,#1c1c1c,#050505);

border:1px solid #ff5a00;

color:#ff7a2a;

font-size:13px;
font-weight:bold;

padding:8px 14px;

text-align:center;

cursor:pointer;

letter-spacing:2px;

border-radius:3px;

box-shadow:
0 0 6px rgba(255,90,0,0.6),
inset 0 2px 4px rgba(255,255,255,0.15),
inset 0 -3px 6px rgba(0,0,0,0.9);

transition: all 0.2s ease;

}

/* hover */
.vox-button:hover{

color:white;

box-shadow:
0 0 18px rgba(255,90,0,1),
inset 0 0 10px rgba(255,120,0,0.7);

transform: translateX(-3px);

}

  .vox-panel{

background: linear-gradient(180deg,#1c1c1c,#050505);

border:2px solid #2b2b2b;

padding:20px 15px;

box-shadow:
0 0 10px rgba(0,0,0,0.8),
inset 0 2px 6px rgba(255,255,255,0.05),
inset 0 -3px 8px rgba(0,0,0,0.9);

border-radius:4px;

}
  .vox-panel::before,
.vox-panel::after{

content:"";

position:absolute;

width:12px;
height:12px;

background: radial-gradient(circle at 30% 30%, #666, #111);
border-radius:50%;
border:1px solid #000;
  
box-shadow:
0 1px 2px rgba(0,0,0,0.9),
inset 0 -2px 3px rgba(255,120,0,0.35),
inset 0 2px 3px rgba(0,0,0,0.9);

}
  .vox-panel::before{

top:4px;
left:15px;

}
  .vox-panel::after{

top:4px;
right:15px;

}
</style>

</head>

<body>

<div class="navbar">

<div class="logo">
VULCAN OX LOGISTICS
</div>

<div class="menu">

<a href="index.html">Domů</a>
<a href="#">Konvoje</a>
<a href="#">Firma</a>
<a href="https://discord.gg/EPTJv8u6">Discord</a>

</div>

</div>
<div class="vox-menu">

<div class="vox-panel">

<button class="vox-button">KDO JSME</button>

</div>

</div>
  
<div class="content">

<h1>Vítejte ve VOX</h1>
<p>Oficiální web Vulcan Ox Logistics</p>

</div>

</body>
</html>
