<!DOCTYPE html>
<html lang="cs">
<head>

<title>Vulcan Ox Logistics</title>

<style>

body{

margin:0;
font-family:Arial, sans-serif;
color:white;

background-image:url("homeback1.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

/* horní lišta */

.navbar{
position:fixed;
top:0;
left:0;

width:100%;
height:70px;

background:linear-gradient(#111,#0b0b0b);
border-bottom:2px solid #ff6600;
box-shadow:0 0 20px rgba(255,100,0,0.4);

display:flex;
align-items:center;
justify-content:space-between;

padding:0 40px;
box-sizing:border-box;
}

.logo{
font-size:22px;
color:#ff6600;
font-weight:bold;
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
}

.menu a:hover{
color:#ff6600;
text-shadow:0 0 10px #ff6600;
}

/* obsah */

.content{
margin-top:120px;
text-align:center;
}

/* pravý panel */
.vox-menu {
position: fixed;
right: 0;
top: 120px;
width: 260px;
display: flex;
flex-direction: column;
gap: 20px;
padding-right: 20px;
}

/* VOX tlačítko */
.vox-button {

background: linear-gradient(145deg,#1a1a1a,#050505);
border: 2px solid #ff5a00;

color: #ff7b2f;
font-weight: bold;
font-size: 18px;

padding: 16px 20px;

text-align: center;
cursor: pointer;

letter-spacing: 1px;

box-shadow:
0 0 10px rgba(255,90,0,0.4),
inset 0 0 10px rgba(255,90,0,0.25);

transition: all 0.25s ease;

}

/* hover efekt */
.vox-button:hover {

background: linear-gradient(145deg,#2a0d00,#120500);

color: #ffffff;

box-shadow:
0 0 18px rgba(255,100,0,0.9),
inset 0 0 14px rgba(255,100,0,0.5);

transform: translateX(-5px);

}  
</style>

</head>

<body>

<div class="navbar">

<div class="logo">
VULCAN OX LOGISTICS
</div>

<div class="menu">

<a href="index.html">Domů</a>

</div>

</div>
<div class="vox-menu">

KDO JSME
</div>

</div>
